services:
  - type: web
    name: blacklace-publisher-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm@10 && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 24
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: blacklace-publisher-db
          property: connectionString
      - key: AI_PROVIDER
        value: mock
      - key: KNOWLEDGE_CONNECTOR
        value: mock

  - type: web
    name: blacklace-publisher-web
    runtime: static
    rootDir: .
    buildCommand: npm install -g pnpm@10 && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/blacklace-publisher run build
    staticPublishPath: artifacts/blacklace-publisher/dist/public
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: PORT
        value: 3000
      - key: BASE_PATH
        value: /
      - key: VITE_API_BASE_URL
        value: https://blacklace-publisher-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: blacklace-publisher-db
    plan: free
